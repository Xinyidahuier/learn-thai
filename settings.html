<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="light">
<meta name="darkreader-lock">
<title>设置 · Learn Thai</title>
<link rel="icon" href="logo.svg" type="image/svg+xml">
<link rel="stylesheet" href="style.css?v=20260422">
<style>
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 700; color: var(--text-dim); margin-bottom: 6px; }
  .field input[type=text], .field input[type=password] {
    width: 100%;
    padding: 12px 14px;
    background: white;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: inherit;
    font-weight: 600;
    color: var(--text);
  }
  .field input:focus { outline: none; border-color: var(--blue); }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    background: var(--bg-2);
    color: var(--text-dim);
  }
  .status-pill.ok { background: rgba(88, 204, 2, 0.12); color: var(--green-dark); }
  .status-pill.err { background: rgba(255, 75, 75, 0.12); color: var(--red-dark); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
  .help {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.7;
    margin: 0 0 12px;
    font-weight: 600;
  }
  .help code {
    background: var(--bg-2);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 11px;
    font-family: ui-monospace, Menlo, monospace;
  }
</style>
</head>
<body>
<header>
  <a href="index.html" class="back">← 返回</a>
  <h1 style="font-size:22px">设置</h1>
</header>

<main style="max-width:640px;margin:0 auto;padding:8px 20px 120px">
  <section>
    <h2 class="section-title"><span class="section-tag tag-blue">跨设备同步</span></h2>
    <p class="help">
      进度会自动同步到你 GitHub 账号下的一个私密 Gist。每台设备设置一次 token 就行。<br>
      创建 token：<a href="https://github.com/settings/tokens?type=beta" target="_blank" style="color:var(--blue)">github.com/settings/tokens</a>
      （fine-grained 推荐，权限选 <code>Gists: Read and write</code>；或经典 token 勾选 <code>gist</code>）
    </p>
    <div class="field">
      <label>GitHub Token</label>
      <input id="tokenInput" type="password" placeholder="ghp_... 或 github_pat_..." autocomplete="off">
    </div>
    <div class="btn-row" style="margin-bottom:14px">
      <button id="saveTokenBtn" class="btn btn-primary">保存并测试</button>
      <button id="clearTokenBtn" class="btn">清除 token</button>
    </div>
    <div id="status" class="status-pill"><span class="status-dot"></span><span id="statusText">加载中…</span></div>
    <p id="gistInfo" class="help" style="margin-top:10px" hidden></p>
  </section>

  <section style="margin-top:40px">
    <h2 class="section-title"><span class="section-tag tag-blue">手动导出 / 导入</span></h2>
    <p class="help">备用方式：文件下载 / 上传。平时用上面的自动同步就够了。</p>
    <div class="btn-row">
      <button id="exportBtn" class="btn">导出 JSON</button>
      <button id="importBtn" class="btn">导入 JSON</button>
      <input type="file" id="importFile" accept=".json" hidden>
    </div>
  </section>

  <section style="margin-top:40px">
    <h2 class="section-title"><span class="section-tag tag-green">危险操作</span></h2>
    <p class="help">重置只清除复习进度，文章和词汇库不会被删除。</p>
    <div class="btn-row">
      <button id="resetBtn" class="btn btn-danger">重置进度</button>
    </div>
  </section>
</main>

<script src="app.js?v=20260422"></script>
<script src="sync.js?v=20260422"></script>
<script>
(async () => {
  await App.loadData();

  const tokenInput = document.getElementById('tokenInput');
  const statusEl = document.getElementById('status');
  const statusText = document.getElementById('statusText');
  const gistInfo = document.getElementById('gistInfo');

  function setStatus(cls, msg) {
    statusEl.className = 'status-pill ' + cls;
    statusText.textContent = msg;
  }

  function refreshStatus() {
    if (!Sync.isEnabled()) {
      setStatus('', '未启用同步');
      gistInfo.hidden = true;
      return;
    }
    const gid = Sync.getGistId();
    const ts = Sync.getLocalSyncedAt();
    if (gid) {
      gistInfo.hidden = false;
      const when = ts ? new Date(ts).toLocaleString('zh-CN') : '从未';
      gistInfo.innerHTML = `Gist: <a href="https://gist.github.com/${gid}" target="_blank" style="color:var(--blue)">${gid.slice(0,8)}…</a> · 最近同步: ${when}`;
    } else {
      gistInfo.hidden = true;
    }
  }

  // Prefill token (masked). We only show dots — the real value stays in localStorage.
  if (Sync.getToken()) tokenInput.placeholder = '••••••••••• (已保存，替换请粘贴新的)';

  // On load, try to sync so user sees current state
  const res = await Sync.startAndWait();
  if (res.status === 'pulled') setStatus('ok', '✓ 从云端拉取最新进度');
  else if (res.status === 'pushed-newer-local') setStatus('ok', '✓ 已推送本地进度到云端');
  else if (res.status === 'seeded') setStatus('ok', '✓ 已创建云端 Gist 并初始化');
  else if (res.status === 'in-sync') setStatus('ok', '✓ 已同步');
  else if (res.status === 'disabled') setStatus('', '未启用同步');
  else setStatus('err', '✗ ' + (res.error || '同步失败'));
  refreshStatus();

  document.getElementById('saveTokenBtn').addEventListener('click', async () => {
    const val = tokenInput.value.trim();
    if (!val) { alert('请粘贴 token'); return; }
    Sync.setToken(val);
    tokenInput.value = '';
    setStatus('', '测试中…');
    const r = await Sync.startAndWait();
    if (r.status === 'error') {
      setStatus('err', '✗ ' + r.error);
      alert('Token 无效或无 gist 权限：' + r.error);
    } else {
      setStatus('ok', '✓ 已启用 — ' + r.status);
      refreshStatus();
    }
  });

  document.getElementById('clearTokenBtn').addEventListener('click', () => {
    if (!confirm('清除 token 会停止同步（本地进度保留）。确定？')) return;
    Sync.clearToken();
    tokenInput.placeholder = 'ghp_... 或 github_pat_...';
    setStatus('', '未启用同步');
    refreshStatus();
  });

  // --- manual export / import / reset ---
  document.getElementById('exportBtn').addEventListener('click', () => {
    const blob = new Blob([App.exportProgress()], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `learn-thai-progress-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  });

  document.getElementById('importBtn').addEventListener('click', () => {
    document.getElementById('importFile').click();
  });

  document.getElementById('importFile').addEventListener('change', async (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const text = await f.text();
    try {
      App.importProgress(text);
      alert('导入成功！');
      location.href = 'index.html';
    } catch (err) {
      alert('导入失败：' + err.message);
    }
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    if (confirm('确定清除所有复习进度？（文章和词汇不会删除）')) {
      App.resetProgress();
      location.href = 'index.html';
    }
  });
})();
</script>
</body>
</html>
