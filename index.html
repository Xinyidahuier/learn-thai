<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="light">
<meta name="darkreader-lock">
<title>Learn Thai — 商业泰语</title>
<link rel="icon" href="logo.svg" type="image/svg+xml">
<link rel="stylesheet" href="style.css?v=20260425">
</head>
<body class="home-body">
<div class="hero-bg"></div>

<header>
  <div class="header-logo">
    <img src="logo.svg" alt="logo" class="site-logo">
    <div class="header-titles">
      <h1>Learn Thai</h1>
      <p class="sub">商业泰语 · 听说优先</p>
    </div>
  </div>
</header>

<main>
  <section class="hero">
    <a class="review-banner" href="review.html">
      <div class="review-banner-main">
        <div class="review-num" id="dueCount">—</div>
        <div class="review-label">今日待复习<br><span class="review-sub">点击开始 →</span></div>
      </div>
      <div class="review-arrow">▶</div>
    </a>
    <div class="stat-pills">
      <div class="stat-pill pill-streak">
        <div class="pill-icon">🔥</div>
        <div class="pill-body">
          <div class="pill-num" id="streak">—</div>
          <div class="pill-label">连续天数</div>
        </div>
      </div>
      <a class="stat-pill pill-total" href="review.html?all=1">
        <div class="pill-icon">📚</div>
        <div class="pill-body">
          <div class="pill-num" id="totalCount">—</div>
          <div class="pill-label">总卡片</div>
        </div>
      </a>
      <div class="stat-pill pill-new">
        <div class="pill-icon">✨</div>
        <div class="pill-body">
          <div class="pill-num" id="newCount">—</div>
          <div class="pill-label">新卡片</div>
        </div>
      </div>
    </div>
  </section>

  <section id="favoritesSection" hidden>
    <h2 class="section-title"><span class="section-tag tag-yellow">⭐ 收藏</span></h2>
    <div id="favoritesList" class="video-list"></div>
  </section>

  <section>
    <h2 class="section-title"><span class="section-tag tag-blue">📖 正在学</span></h2>
    <div id="studyingList" class="video-list"><p class="muted">加载中…</p></div>
  </section>

  <section id="finishedSection" hidden>
    <h2 class="section-title"><span class="section-tag tag-green">✓ 已学完</span></h2>
    <div id="finishedList" class="video-list"></div>
  </section>

  <p class="add-hint">💬 想加新内容？把 YouTube 链接 / 音频 / 泰语文本发给 Claude，处理好刷新这里即可。</p>
</main>

<script src="app.js?v=20260422"></script>
<script src="sync.js?v=20260424"></script>
<script src="home.js?v=20260422"></script>
</body>
</html>
